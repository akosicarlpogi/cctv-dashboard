<!DOCTYPE html>
<html>
<head>
    <title>CCTV Security Login</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #eee;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            width: 300px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        .captcha-box {
            margin-top: 5px;
            margin-bottom: 5px;
            font-size: 0.95em;
        }

        .captcha-question {
            display: inline-block;
            padding: 5px 8px;
            background: #f1f1f1;
            border-radius: 4px;
            font-weight: bold;
            margin-left: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin-top: 8px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .error {
            color: red;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Login</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <p class="error">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" id="loginForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="captcha_token" value="{{ captcha_token }}">
            <input type="hidden" id="client_device_info" name="client_device_info">

            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>

            <div class="captcha-box">
                Security Check:
                <span class="captcha-question">{{ captcha_question }}</span>
            </div>

            <input type="text" name="captcha_answer" placeholder="Answer" required>

            <button type="submit">Login</button>
        </form>
    </div>

    <script>
        function detectDeviceInfo() {
            const ua = navigator.userAgent || "";
            const platform = navigator.platform || "";
            const maxTouchPoints = navigator.maxTouchPoints || 0;

            let os = "Unknown OS";
            let deviceType = "Unknown Device";

            const isIpad =
                ua.includes("iPad") ||
                (platform === "MacIntel" && maxTouchPoints > 1);

            if (isIpad) {
                os = "iPadOS";
                deviceType = "Tablet";
            } else if (ua.includes("iPhone")) {
                os = "iOS";
                deviceType = "Mobile";
            } else if (ua.includes("Android")) {
                os = "Android";
                deviceType = ua.includes("Mobile") ? "Mobile" : "Tablet";
            } else if (ua.includes("Windows")) {
                os = "Windows";
                deviceType = "Desktop";
            } else if (ua.includes("Mac OS X") || ua.includes("Macintosh")) {
                os = "Mac OS X";
                deviceType = "Desktop";
            } else if (ua.includes("Linux")) {
                os = "Linux";
                deviceType = "Desktop";
            }

            return `${os} (${deviceType})`;
        }

        function setDeviceInfoField() {
            const deviceInfoField = document.getElementById("client_device_info");

            if (deviceInfoField) {
                deviceInfoField.value = detectDeviceInfo();
            }
        }

        window.addEventListener("load", setDeviceInfoField);

        document.getElementById("loginForm").addEventListener("submit", function () {
            setDeviceInfoField();
        });
    </script>
</body>
</html>
